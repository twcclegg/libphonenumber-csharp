<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>libphonenumber-csharp · Demo</title>
    <meta name="description" content="Parse, format, validate and enrich phone numbers in the browser via WebAssembly." />
    <base href="/" />

    <!-- pre-paint: resolve theme before Blazor mounts to avoid a flash -->
    <script>
        (function () {
            try {
                const stored = localStorage.getItem('phone-demo-theme');
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = stored || (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme;
            } catch (e) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link href="css/app.css" rel="stylesheet" />
    <link href="css/layout.css" rel="stylesheet" />
    <link href="css/sidebar.css" rel="stylesheet" />
    <link href="css/hero.css" rel="stylesheet" />
    <link href="css/card.css" rel="stylesheet" />
    <link href="css/page-header.css" rel="stylesheet" />
    <link href="css/form.css" rel="stylesheet" />
    <link href="css/badge.css" rel="stylesheet" />
    <link href="css/result-grid.css" rel="stylesheet" />
    <link href="css/format-list.css" rel="stylesheet" />
    <link href="css/data-table.css" rel="stylesheet" />
    <link href="css/feature-grid.css" rel="stylesheet" />
    <link href="css/match-list.css" rel="stylesheet" />
    <link href="css/live-formatter.css" rel="stylesheet" />
    <link href="css/empty-state.css" rel="stylesheet" />
    <link href="css/install-block.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="loading" role="status" aria-label="Loading application">
            <div class="loading__spinner" aria-hidden="true"></div>
            <p class="loading__text">Loading libphonenumber-csharp demo…</p>
            <p class="loading__sub">Downloading WebAssembly runtime</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
    </div>

    <!-- Minimal helpers for theme switching and clipboard (no framework, no deps). -->
    <script>
        window.phoneDemo = {
            getTheme: function () {
                return document.documentElement.getAttribute('data-theme') || 'light';
            },
            setTheme: function (theme) {
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme;
                try { localStorage.setItem('phone-demo-theme', theme); } catch (e) {}
                return theme;
            },
            toggleTheme: function () {
                return this.setTheme(this.getTheme() === 'dark' ? 'light' : 'dark');
            },
            copyText: function (text) {
                const fallback = function () {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    try {
                        document.execCommand('copy');
                    } catch (e) {
                    }
                    document.body.removeChild(ta);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text).catch(fallback);
                }
                fallback();
                return Promise.resolve();
            }
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
