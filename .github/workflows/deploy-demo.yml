name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'csharp/PhoneNumbers.Demo/**'
      - 'csharp/PhoneNumbers/**'
      - 'csharp/PhoneNumbers.Extensions/**'
      - 'resources/**'
      - '.github/workflows/deploy-demo.yml'
  schedule:
    # Rebuild weekly to pick up any NuGet dependency updates
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.x

      - name: Publish Blazor WASM app
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          dotnet publish csharp/PhoneNumbers.Demo/PhoneNumbers.Demo.csproj -c Release -o release -p:PathBase=/${REPO_NAME}/

      - name: Configure for GitHub Pages
        run: |
          cp release/wwwroot/index.html release/wwwroot/404.html
          touch release/wwwroot/.nojekyll

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: release/wwwroot

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
